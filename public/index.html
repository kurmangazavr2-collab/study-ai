<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0f0e0c;
  --paper: #f5f2eb;
  --cream: #ede9de;
  --accent: #c8391a;
  --green: #1a5c3a;
  --muted: #6b6860;
  --serif: 'DM Serif Display', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --sans: 'Manrope', sans-serif;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  min-height: 100vh;
}

header {
  border-bottom: 3px solid var(--ink);
  padding: 20px 40px;
  text-align: center;
}

header h1 {
  font-family: var(--serif);
  font-size: 42px;
  letter-spacing: -1px;
  line-height: 1;
}

header h1 em { font-style: italic; color: var(--accent); }

header p {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-top: 4px;
}

main {
  max-width: 760px;
  margin: 0 auto;
  padding: 40px;
}

.headline {
  font-family: var(--serif);
  font-size: 48px;
  line-height: 1.05;
  letter-spacing: -1.5px;
  margin-bottom: 8px;
}

.headline em { font-style: italic; color: var(--accent); }

.deck {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 32px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--ink);
}

.tabs {
  display: flex;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 16px;
}

.tabs button {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
}

.tabs button.active {
  background: var(--ink);
  color: var(--paper);
}

.upload-area {
  border: 2px dashed var(--ink);
  padding: 40px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 24px;
}

.upload-area:hover { background: var(--cream); }
.upload-area.has-file { border-style: solid; border-color: var(--green); background: #eef5ee; }
.upload-area.drag-over { background: var(--cream); border-color: var(--accent); }

.upload-inner { display: flex; align-items: center; gap: 20px; }

.upload-icon-box {
  width: 56px;
  height: 56px;
  border: 2px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  background: var(--paper);
}

.upload-text h3 { font-family: var(--serif); font-size: 22px; margin-bottom: 4px; }
.upload-text p { font-family: var(--mono); font-size: 11px; color: var(--muted); }

.file-status { display: none; }
.has-file .file-status { display: flex; }
.has-file .upload-placeholder { display: none; }

.file-badge {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--green);
  color: #fff;
  padding: 3px 10px;
}

.remove-btn {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  background: none;
  border: none;
}

textarea {
  width: 100%;
  min-height: 180px;
  padding: 16px;
  font-family: var(--sans);
  font-size: 14px;
  border: 2px solid var(--ink);
  background: var(--paper);
  color: var(--ink);
  resize: vertical;
  outline: none;
  line-height: 1.6;
  margin-bottom: 24px;
  display: block;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 2px solid var(--ink);
  margin-bottom: 32px;
}

.btn-action {
  padding: 20px 24px;
  cursor: pointer;
  border: none;
  background: transparent;
  text-align: left;
  font-family: var(--sans);
  transition: background 0.15s;
}

.btn-action:first-child { border-right: 2px solid var(--ink); }
.btn-action:hover:not(:disabled) { background: var(--cream); }
.btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-action.dark { background: var(--ink); }
.btn-action.dark:hover:not(:disabled) { background: #2a2922; }

.btn-flag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}

.btn-action.dark .btn-flag { color: rgba(255,255,255,0.45); }

.btn-title {
  font-family: var(--serif);
  font-size: 22px;
  display: block;
  color: var(--ink);
  margin-bottom: 4px;
}

.btn-action.dark .btn-title { color: var(--paper); }

.btn-sub { font-size: 12px; color: var(--muted); display: block; }
.btn-action.dark .btn-sub { color: rgba(255,255,255,0.55); }

.loading {
  display: none;
  align-items: center;
  gap: 16px;
  padding: 16px 0;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  margin-bottom: 24px;
}

.loading.on { display: flex; }

.dots { display: flex; gap: 4px; }
.dots span {
  width: 6px; height: 6px;
  background: var(--ink);
  border-radius: 50%;
  animation: blink 1s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.loading-text { font-family: var(--mono); font-size: 12px; color: var(--muted); }

.error {
  display: none;
  background: #fdf0ed;
  border-left: 4px solid var(--accent);
  padding: 12px 16px;
  margin-bottom: 20px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
}

.error.on { display: block; }

.result { display: none; animation: up 0.25s ease; }
.result.on { display: block; }
@keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.result-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 20px;
}

.result-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--paper);
  padding: 2px 7px;
}

.result-tag.quiz { background: var(--green); }
.result-title { font-family: var(--serif); font-size: 28px; }

.summary-text { font-size: 15px; line-height: 1.75; white-space: pre-wrap; }

.quiz-list { display: flex; flex-direction: column; gap: 20px; }
.q-card { border: 1px solid var(--ink); }

.q-num {
  padding: 8px 14px;
  border-bottom: 1px solid var(--ink);
  background: var(--cream);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.q-text {
  padding: 14px;
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.3;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.q-opts { padding: 10px; display: flex; flex-direction: column; gap: 4px; }

.opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  border: 1px solid transparent;
  background: none;
  text-align: left;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  width: 100%;
  transition: background 0.1s;
}

.opt:hover:not(.done) { background: var(--cream); }
.opt.correct { border-color: var(--green); background: #eef5ee; color: var(--green); }
.opt.wrong { border-color: var(--accent); background: #fdf0ed; color: var(--accent); }

.opt-letter {
  width: 22px; height: 22px;
  border: 1.5px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10px;
  flex-shrink: 0;
}

.q-explain {
  display: none;
  padding: 10px 14px;
  border-top: 1px solid rgba(0,0,0,0.08);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
  background: var(--cream);
}

.q-explain.on { display: block; }

.score {
  display: none;
  border: 2px solid var(--ink);
  padding: 24px;
  margin-top: 20px;
  gap: 20px;
  align-items: center;
}

.score.on { display: flex; }
.score-num { font-family: var(--serif); font-size: 72px; line-height: 1; }
.score-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.score-verdict { font-family: var(--serif); font-size: 22px; margin-top: 4px; }

footer {
  border-top: 2px solid var(--ink);
  padding: 14px 40px;
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

input[type=file] { display: none; }

@media (max-width: 600px) {
  main { padding: 24px 20px; }
  .headline { font-size: 36px; }
  .actions { grid-template-columns: 1fr; }
  .btn-action:first-child { border-right: none; border-bottom: 2px solid var(--ink); }
}
</style>
</head>
<body>

<header>
  <h1>Study<em>AI</em></h1>
  <p>Краткое содержание · Викторина</p>
</header>

<main>
  <h2 class="headline">Учись <em>умнее.</em><br>Не дольше.</h2>
  <p class="deck">Загрузи файл, фото или вставь текст — ИИ сделает краткое содержание или проверит знания.</p>

  <div class="tabs">
    <button class="active" id="tabFile" onclick="switchTab('file')">📎 Файл / Фото</button>
    <button id="tabText" onclick="switchTab('text')">✏️ Вставить текст</button>
  </div>

  <div id="panelFile">
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".txt,.pdf,.png,.jpg,.jpeg,.webp">
      <div class="upload-inner upload-placeholder">
        <div class="upload-icon-box">📄</div>
        <div class="upload-text">
          <h3>Перетащи файл сюда</h3>
          <p>или нажми · PDF, JPG, PNG, TXT</p>
        </div>
      </div>
      <div class="upload-inner file-status">
        <div class="upload-icon-box">✓</div>
        <div class="upload-text">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <span class="file-badge">ЗАГРУЖЕН</span>
            <button class="remove-btn" id="removeBtn">удалить</button>
          </div>
          <span id="fileName" style="font-family:var(--mono);font-size:12px"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="panelText" style="display:none">
    <textarea id="textInput" placeholder="Вставь текст учебного материала..."></textarea>
  </div>

  <div class="actions">
    <button class="btn-action dark" id="btnSummary" disabled>
      <span class="btn-flag">Функция 1</span>
      <span class="btn-title">Краткое содержание</span>
      <span class="btn-sub">Главные мысли за минуту</span>
    </button>
    <button class="btn-action" id="btnQuiz" disabled>
      <span class="btn-flag">Функция 2</span>
      <span class="btn-title">Викторина</span>
      <span class="btn-sub">5 вопросов с ответами</span>
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="loading-text" id="loadingText">Анализирую...</span>
  </div>

  <div class="error" id="errorBox"></div>

  <div class="result" id="resultBox">
    <div class="result-header">
      <span class="result-tag" id="resultTag"></span>
      <span class="result-title" id="resultTitle"></span>
    </div>
    <div id="resultBody"></div>
  </div>
</main>

<footer>
  <span>StudyAI</span>
  <span>Gemini 2.5 Flash</span>
</footer>

<script>
let file = null;
let tab = 'file';
let quiz = null;
let answered = new Set();
let score = 0;

const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');
const removeBtn  = document.getElementById('removeBtn');
const textInput  = document.getElementById('textInput');
const btnSummary = document.getElementById('btnSummary');
const btnQuiz    = document.getElementById('btnQuiz');

function switchTab(t) {
  tab = t;
  document.getElementById('panelFile').style.display = t === 'file' ? 'block' : 'none';
  document.getElementById('panelText').style.display = t === 'text' ? 'block' : 'none';
  document.getElementById('tabFile').className = t === 'file' ? 'active' : '';
  document.getElementById('tabText').className = t === 'text' ? 'active' : '';
  updateBtns();
}

function updateBtns() {
  const ok = (tab === 'file' && file) || (tab === 'text' && textInput.value.trim().length > 10);
  btnSummary.disabled = !ok;
  btnQuiz.disabled = !ok;
}

textInput.addEventListener('input', updateBtns);

uploadArea.addEventListener('click', e => { if (e.target !== removeBtn) fileInput.click(); });
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
removeBtn.addEventListener('click', e => {
  e.stopPropagation();
  file = null;
  fileInput.value = '';
  uploadArea.classList.remove('has-file');
  updateBtns();
});

function setFile(f) {
  file = f;
  document.getElementById('fileName').textContent = f.name;
  uploadArea.classList.add('has-file');
  updateBtns();
}

function reset() {
  document.getElementById('errorBox').classList.remove('on');
  document.getElementById('resultBox').classList.remove('on');
  quiz = null; answered.clear(); score = 0;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('on');
}

async function getBody(action) {
  if (tab === 'text') return { action, text: textInput.value.trim() };
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    if (file.type.startsWith('image/') || file.type === 'application/pdf') {
      reader.onload = () => resolve({ action, fileBase64: reader.result.split(',')[1], mimeType: file.type });
      reader.readAsDataURL(file);
    } else {
      reader.onload = () => resolve({ action, text: reader.result });
      reader.readAsText(file);
    }
    reader.onerror = reject;
  });
}

async function send(action) {
  reset();
  btnSummary.disabled = true;
  btnQuiz.disabled = true;

  const loadingEl = document.getElementById('loading');
  loadingEl.classList.add('on');
  document.getElementById('loadingText').textContent =
    action === 'summary' ? 'Составляю краткое содержание...' : 'Генерирую викторину...';

  let body;
  try {
    body = await getBody(action);
  } catch(e) {
    loadingEl.classList.remove('on');
    updateBtns();
    return showError('Не удалось прочитать файл');
  }

  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    loadingEl.classList.remove('on');
    if (!res.ok || data.error) return showError(data.error || 'Ошибка сервера');
    action === 'summary' ? showSummary(data.result) : showQuiz(data.result);
  } catch(e) {
    loadingEl.classList.remove('on');
    showError('Ошибка сети');
  }

  updateBtns();
}

btnSummary.addEventListener('click', () => send('summary'));
btnQuiz.addEventListener('click', () => send('quiz'));

function showSummary(text) {
  document.getElementById('resultTag').textContent = 'Краткое содержание';
  document.getElementById('resultTag').className = 'result-tag';
  document.getElementById('resultTitle').textContent = 'Анализ материала';
  document.getElementById('resultBody').innerHTML = `<div class="summary-text">${text.replace(/</g,'&lt;')}</div>`;
  document.getElementById('resultBox').classList.add('on');
}

function showQuiz(raw) {
  let data;
  try {
    data = JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch(e) {
    return showError('Не удалось разобрать ответ. Попробуй ещё раз.');
  }

  quiz = data;
  document.getElementById('resultTag').textContent = 'Викторина';
  document.getElementById('resultTag').className = 'result-tag quiz';
  document.getElementById('resultTitle').textContent = 'Проверь себя';

  const letters = ['А','Б','В','Г'];
  document.getElementById('resultBody').innerHTML = `<div class="quiz-list">
    ${data.questions.map((q, qi) => `
      <div class="q-card" id="q${qi}">
        <div class="q-num">Вопрос ${qi+1} / ${data.questions.length}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-opts">
          ${q.options.map((opt, oi) => `
            <button class="opt" onclick="pick(${qi},${oi})">
              <span class="opt-letter">${letters[oi]}</span>${opt}
            </button>
          `).join('')}
        </div>
        <div class="q-explain" id="e${qi}">${q.explanation}</div>
      </div>
    `).join('')}
    <div class="score" id="scoreBox">
      <div class="score-num" id="scoreNum"></div>
      <div>
        <div class="score-label">Правильных ответов</div>
        <div class="score-verdict" id="scoreVerdict"></div>
      </div>
    </div>
  </div>`;

  document.getElementById('resultBox').classList.add('on');
}

window.switchTab = switchTab;

window.pick = function(qi, oi) {
  if (answered.has(qi)) return;
  answered.add(qi);

  const q = quiz.questions[qi];
  document.getElementById('q'+qi).querySelectorAll('.opt').forEach((btn, i) => {
    btn.classList.add('done');
    if (i === q.correct) btn.classList.add('correct');
    else if (i === oi) btn.classList.add('wrong');
  });
  if (oi === q.correct) score++;
  document.getElementById('e'+qi).classList.add('on');

  if (answered.size === quiz.questions.length) {
    const total = quiz.questions.length;
    const pct = score / total;
    document.getElementById('scoreNum').textContent = score + '/' + total;
    document.getElementById('scoreVerdict').textContent =
      pct === 1 ? 'Отлично! Всё правильно.' :
      pct >= 0.8 ? 'Хороший результат!' :
      pct >= 0.6 ? 'Неплохо, есть над чем работать.' :
      'Стоит повторить материал.';
    document.getElementById('scoreBox').classList.add('on');
  }
};
</script>
</body>
</html>
